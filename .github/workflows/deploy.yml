# .github/workflows/deploy.yml
name: CI/CD Pipeline for Windows Web Server

# 1. Триггер: запуск при пуше в main
on:
  push:
    branches: [ main ]

# Переменные окружения для удобства
env:
  WEB_SERVER_PATH: 'C:\WebSites\MyApp' # Папка, которую мы создали в IIS

jobs:
  # 2. JOB 1: Тестирование (Оно должно выполниться ДО деплоя)
  test-job:
    name: Run automated tests
    runs-on: self-hosted    # Запускаем на твоем компьютере
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Execute test script
        shell: powershell
        run: ./test.ps1
        # Если этот скрипт вернет exit 1, pipeline остановится и деплой не начнется.

  # 3. JOB 2: Деплой (Зависит от успеха теста)
  deploy-job:
    name: Deploy to IIS Server
    runs-on: self-hosted
    needs: test-job   # <-- Ключевое условие: запускаемся только после успеха test-job
    
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
      
      # Останавливаем сайт в IIS на время замены файлов
      - name: Stop IIS Site
        shell: powershell
        run: |
          Write-Host "Stopping IIS Site..."
          # Обращаемся к IIS через утилиту appcmd
          & 'C:\Windows\System32\inetsrv\appcmd.exe' stop site "MyApp"
      
      # Копируем файлы. Robocopy отлично подходит для Windows
      - name: Copy files to web directory
        shell: powershell
        run: |
          Write-Host "Copying files to $env:WEB_SERVER_PATH"
          # Очищаем целевую папку и копируем текущую (включая index.html)
          robocopy . $env:WEB_SERVER_PATH /MIR /R:1 /W:1
          # robocopy возвращает код 1 при успешной операции, это не ошибка
          exit 0
      
      # Включаем сайт обратно
      - name: Start IIS Site
        shell: powershell
        run: |
          Write-Host "Starting IIS Site..."
          & 'C:\Windows\System32\inetsrv\appcmd.exe' start site "MyApp"
          Write-Host "Deployment completed!" 